name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base cdrkit gcompat libc6-compat libstdc++

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Locate and Patch Compiler
        run: |
          # Create the glibc linker symlink for Alpine
          mkdir -p /lib64
          ln -sf /lib/ld-linux-x86-64.so.2 /lib64/ld-linux-x86-64.so.2 || true
          
          # Find where ee-gcc actually lives and save it to a variable
          EE_PATH=$(find /usr -name "ee-gcc" | head -n 1)
          EE_BIN_DIR=$(dirname "$EE_PATH")
          
          if [ -z "$EE_PATH" ]; then
            echo "CRITICAL ERROR: ee-gcc not found in /usr"
            exit 1
          fi
          
          echo "Found compiler at: $EE_PATH"
          chmod +x "$EE_BIN_DIR"/ee-*
          
          # Save these for the next steps
          echo "EE_BIN_DIR=$EE_BIN_DIR" >> $GITHUB_ENV
          echo "$EE_BIN_DIR" >> $GITHUB_PATH

      - name: Compile
        run: |
          # Use the discovered path to run make
          make -f Makefile.libretro \
            CC="$EE_BIN_DIR/ee-gcc" \
            CXX="$EE_BIN_DIR/ee-g++" \
            AR="$EE_BIN_DIR/ee-ar"

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          if [ -f *.elf ]; then
            cp *.elf iso_root/MAIN.ELF
          else
            cp *.a iso_root/ 2>/dev/null || echo "No library files found"
          fi
          
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
