name: Build PS2 Core

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Build Dependencies
        run: |
          # The ps2dev image uses Alpine Linux, so we use apk
          apk add --no-cache make git build-base

      - name: Compile
        run: |
          # Explicitly set the PS2 environment variables
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          
          # Run the build
          make -f Makefile.libretro platform=ps2
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fba2012_cps2_ps2
          path: "*.a"
