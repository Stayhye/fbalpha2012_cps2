name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          # gcompat and libstdc++ are the base, but we need the symlink next
          apk add --no-cache git make build-base cdrkit gcompat libstdc++

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Patch Alpine Loader
        run: |
          # This creates the "missing" link that causes the 'not found' error
          mkdir -p /lib64
          ln -s /lib/libc.musl-x86_64.so.1 /lib64/ld-linux-x86-64.so.2 || true
          
      - name: Verify Compiler Access
        run: |
          # Now this should return the version instead of 'not found'
          /usr/local/ps2dev/ee/bin/ee-gcc --version

      - name: Compile
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export BIN=$PS2DEV/ee/bin
          export PATH=$BIN:$PS2DEV/bin:$PATH
          
          make -f Makefile.libretro \
            CC=$BIN/ee-gcc \
            CXX=$BIN/ee-g++ \
            AR=$BIN/ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          if [ -f *.elf ]; then
            cp *.elf iso_root/MAIN.ELF
          else
            cp *.a iso_root/ 2>/dev/null || echo "No library found"
          fi
          
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
