name: Build PS2 Core

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      # STEP 1: Manually install Git and Make before anything else
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base

      # STEP 2: Now that Git exists, we can checkout with submodules
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # STEP 3: Build using the paths for the PS2 toolchain
      - name: Compile
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          
          # Using the simplified makefile we discussed
          make -f Makefile.libretro platform=ps2
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fba2012_cps2_ps2
          path: "*.a"
