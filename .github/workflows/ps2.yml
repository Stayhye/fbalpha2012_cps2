name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    # v1.0 is the standard Debian-based stable image
    container: ps2dev/ps2dev:v1.0
    steps:
      - name: Install System Dependencies
        run: |
          apt-get update
          # genisoimage is the Debian equivalent of mkisofs
          apt-get install -y git make build-essential genisoimage

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Sync Submodules
        run: |
          # Fix ownership issues for the container environment
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          
          # Initialize submodules
          git submodule update --init --recursive
          
          # Emergency manual clone if the submodule check fails
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            echo "Submodules failed to sync. Manually cloning libretro-common..."
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Set Environment
        run: |
          # Standard PS2DEV paths
          echo "PS2DEV=/usr/local/ps2dev" >> $GITHUB_ENV
          echo "PS2SDK=/usr/local/ps2dev/ps2sdk" >> $GITHUB_ENV
          echo "/usr/local/ps2dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps2dev/ee/bin" >> $GITHUB_PATH
          echo "/usr/local/ps2dev/iop/bin" >> $GITHUB_PATH

      - name: Verify Compiler Access
        run: |
          # This should now work natively on Debian
          ee-gcc --version

      - name: Compile
        run: |
          # Run the build using our PS2 Makefile
          make -f Makefile.libretro

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          
          # Check for compiled ELF
          if [ -f *.elf ]; then
            cp *.elf iso_root/MAIN.ELF
          else
            # Fallback to .a library if the ELF link hasn't happened yet
            cp *.a iso_root/ 2>/dev/null || echo "No files to copy"
          fi
          
          # Create SYSTEM.CNF for PCSX2/PS2 booting
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          genisoimage -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
