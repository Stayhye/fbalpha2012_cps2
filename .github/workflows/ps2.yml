name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          # We need all three of these for maximum glibc compatibility on Alpine
          apk add --no-cache git make build-base cdrkit gcompat libc6-compat libstdc++

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Alpine Environment Patch
        run: |
          # Create the expected 64-bit linker path
          mkdir -p /lib64
          [ ! -L /lib64/ld-linux-x86-64.so.2 ] && ln -s /lib/ld-linux-x86-64.so.2 /lib64/ld-linux-x86-64.so.2 || true
          
          # Debug: Show us what the binary is missing if it still says "not found"
          echo "Checking binary dependencies..."
          ldd /usr/local/ps2dev/ee/bin/ee-gcc || true

      - name: Verify Compiler Access
        run: |
          # This must pass for the next step to work
          /usr/local/ps2dev/ee/bin/ee-gcc --version

      - name: Compile
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export BIN=$PS2DEV/ee/bin
          export PATH=$BIN:$PS2DEV/bin:$PATH
          
          make -f Makefile.libretro \
            CC=$BIN/ee-gcc \
            CXX=$BIN/ee-g++ \
            AR=$BIN/ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          if [ -f *.elf ]; then
            cp *.elf iso_root/MAIN.ELF
          else
            # If no ELF, we grab the .a library so you have something to download
            cp *.a iso_root/ 2>/dev/null || echo "No files to copy"
          fi
          
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
