name: Build PS2 Core

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base

      - name: Checkout Code
        uses: actions/checkout@v4
        # We try recursive here, but we will force it in the next step just in case
        with:
          submodules: recursive

      - name: Fix Permissions and Force Submodules
        run: |
          # 1. Trust the directory
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          
          # 2. Manually initialize and update submodules
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Verify Files (Final Check)
        run: |
          ls -l libretro-common/file/retro_dirent.c

      - name: Compile
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          
          make -f Makefile.libretro
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fba2012_cps2_ps2
          path: "*.a"
