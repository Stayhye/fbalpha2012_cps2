name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          # gcompat allows the PS2 compilers to run on Alpine Linux
          apk add --no-cache git make build-base cdrkit gcompat

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          # Fix ownership issues
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          
          # Force submodules
          git submodule update --init --recursive
          
          # Emergency manual clone for libretro-common
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Compile
        run: |
          # Define absolute paths
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export BIN=$PS2DEV/ee/bin
          
          # Add to path for this step
          export PATH=$BIN:$PS2DEV/bin:$PATH
          
          # Run make and force the compiler locations
          make -f Makefile.libretro \
            CC=$BIN/ee-gcc \
            CXX=$BIN/ee-g++ \
            AR=$BIN/ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          
          # Copy ELF if built, else copy the .a for debugging
          if [ -f *.elf ]; then
            cp *.elf iso_root/MAIN.ELF
          else
            echo "No ELF found, copying static lib for artifact storage"
            cp *.a iso_root/
          fi
          
          # Boot config
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
