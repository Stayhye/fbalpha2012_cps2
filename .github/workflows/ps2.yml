name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base cdrkit # cdrkit provides mkisofs

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Manually Clone Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          # Manual clone if submodule sync fails
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Compile
        run: |
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          make -f Makefile.libretro

      - name: Prepare ISO Structure
        run: |
          mkdir -p iso_root
          # Copy your compiled ELF to the ISO root
          # If your Makefile only outputs a .a, you must link it to an ELF first.
          # Assuming you have a fba_cps2.elf:
          cp *.elf iso_root/ || echo "No ELF found to copy!"
          
          # Create the SYSTEM.CNF so the PS2 knows what to boot
          echo "BOOT2 = cdrom0:\FBA_CPS2.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF

      - name: Create ISO
        run: |
          # Create the bootable ISO image
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Game-ISO
          path: fba_cps2.iso
