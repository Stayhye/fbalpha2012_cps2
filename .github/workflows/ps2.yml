name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base cdrkit

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Manually Clone Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Compile
        run: |
          # Define the PS2 toolchain locations
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          
          # Add the toolchain binaries to the PATH so 'ee-gcc' is recognized
          export PATH=$PS2DEV/bin:$PS2DEV/ee/bin:$PS2DEV/iop/bin:$PATH
          
          make -f Makefile.libretro

      - name: Prepare ISO Structure
        run: |
          mkdir -p iso_root
          # Note: If your Makefile currently only makes a .a file, 
          # you will need to link it into an .elf to see it here.
          cp *.elf iso_root/ || echo "No ELF found yet"
          
          # Create a basic boot config for PCSX2
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF

      - name: Create ISO
        run: |
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Output
          path: |
            *.a
            *.elf
            *.iso
