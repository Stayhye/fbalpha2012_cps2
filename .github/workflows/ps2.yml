name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base cdrkit

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Sync Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Force Toolchain Paths
        run: |
          # The official ps2dev location
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          
          # Manually verify if the directory exists
          if [ -d "$PS2DEV/ee/bin" ]; then
             echo "Toolchain found in standard location!"
             echo "$PS2DEV/bin" >> $GITHUB_PATH
             echo "$PS2DEV/ee/bin" >> $GITHUB_PATH
             echo "$PS2DEV/iop/bin" >> $GITHUB_PATH
             echo "PS2DEV=$PS2DEV" >> $GITHUB_ENV
             echo "PS2SDK=$PS2SDK" >> $GITHUB_ENV
          else
             echo "DEBUG: /usr/local/ps2dev not found. Listing /usr/local:"
             ls -R /usr/local
             exit 1
          fi

      - name: Compile
        run: |
          # We use absolute paths as a final safety measure
          make -f Makefile.libretro \
            CC=/usr/local/ps2dev/ee/bin/ee-gcc \
            CXX=/usr/local/ps2dev/ee/bin/ee-g++ \
            AR=/usr/local/ps2dev/ee/bin/ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          [ -f *.elf ] && cp *.elf iso_root/MAIN.ELF || echo "No ELF found"
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Output
          path: |
            *.a
            *.elf
            *.iso
