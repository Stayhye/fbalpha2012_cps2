name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          apk add --no-cache git make build-base cdrkit libc6-compat

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Compile
        run: |
          # Define paths locally within the step to ensure they are fresh
          export PS2DEV=/usr/local/ps2dev
          export PS2SDK=$PS2DEV/ps2sdk
          export EE_BIN=$PS2DEV/ee/bin
          
          # We pass the absolute path of the compilers directly into the make variables
          make -f Makefile.libretro \
            PS2DEV=$PS2DEV \
            PS2SDK=$PS2SDK \
            CC=$EE_BIN/ee-gcc \
            CXX=$EE_BIN/ee-g++ \
            AR=$EE_BIN/ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          [ -f *.elf ] && cp *.elf iso_root/MAIN.ELF || echo "No ELF found"
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Output
          path: |
            *.a
            *.elf
            *.iso
