name: Build PS2 Core and Create ISO

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest
    steps:
      - name: Install System Dependencies
        run: |
          apk update
          # Essential for glibc binaries (the compilers) to run on Alpine
          apk add --no-cache git make build-base cdrkit gcompat libc6-compat libstdc++

      - name: Checkout Base Code
        uses: actions/checkout@v4

      - name: Fix Git and Submodules
        run: |
          git config --global --add safe.directory /__w/fbalpha2012_cps2/fbalpha2012_cps2
          git submodule update --init --recursive
          if [ ! -f "libretro-common/file/retro_dirent.c" ]; then
            rm -rf libretro-common
            git clone --depth 1 https://github.com/libretro/libretro-common.git libretro-common
          fi

      - name: Initialize PS2DEV Environment
        run: |
          # The latest image uses /src/ps2dev-env to set up paths
          # We create the glibc linker link first
          mkdir -p /lib64
          ln -sf /lib/ld-linux-x86-64.so.2 /lib64/ld-linux-x86-64.so.2 || true
          
          # Force set the paths that the PS2 toolchain requires
          echo "PS2DEV=/usr/local/ps2dev" >> $GITHUB_ENV
          echo "PS2SDK=/usr/local/ps2dev/ps2sdk" >> $GITHUB_ENV
          echo "GSKIT=/usr/local/ps2dev/gsKit" >> $GITHUB_ENV
          echo "/usr/local/ps2dev/bin" >> $GITHUB_PATH
          echo "/usr/local/ps2dev/ee/bin" >> $GITHUB_PATH
          echo "/usr/local/ps2dev/iop/bin" >> $GITHUB_PATH
          echo "/usr/local/ps2dev/dvp/bin" >> $GITHUB_PATH

      - name: Compile
        run: |
          # Use the environment variables we just set
          make -f Makefile.libretro \
            CC=ee-gcc \
            CXX=ee-g++ \
            AR=ee-ar

      - name: Create ISO for PCSX2
        run: |
          mkdir -p iso_root
          [ -f *.elf ] && cp *.elf iso_root/MAIN.ELF || cp *.a iso_root/ 2>/dev/null || echo "No files"
          
          echo "BOOT2 = cdrom0:\MAIN.ELF;1" > iso_root/SYSTEM.CNF
          echo "VER = 1.00" >> iso_root/SYSTEM.CNF
          echo "VMODE = NTSC" >> iso_root/SYSTEM.CNF
          
          mkisofs -o fba_cps2.iso -R -J -V "FBA_CPS2" iso_root/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PS2-Build-Package
          path: |
            *.a
            *.elf
            *.iso
